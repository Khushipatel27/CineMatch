name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 12 */5 * *'  # every 5 days at noon
  workflow_dispatch:

jobs:
  wake_app:
    runs-on: ubuntu-latest
    steps:
      - name: Wake CineMatch App
        run: |
          curl -L --max-time 60 \
          "https://cinematch09.streamlit.app/" \
          -H "User-Agent: Mozilla/5.0"
          echo "App pinged successfully"
